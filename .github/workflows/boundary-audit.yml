name: boundary-audit

# Enforces the public-repo redaction boundary. Any non-empty check fails the
# build. These checks are the machine half of the boundary; .gitignore is the
# human half. A green run means: no raw target data, no PII, no em dashes, only
# RFC5737 doc IPs in prose, no disclosure-routing files.

on:
  push:
  pull_request:

jobs:
  boundary-audit:
    name: boundary-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: No tracked secret / state / bulk-data artifacts
        shell: bash
        run: |
          set -uo pipefail
          hits="$(git ls-files \
            | grep -E '(\.db$|\.db\.bak|state\.json$|tokens\.json$|ssh_key|\.ndjson$|\.json\.gz$)' \
            || true)"
          if [ -n "$hits" ]; then
            echo "FAIL: tracked secret/state/bulk-data files:"
            echo "$hits"
            exit 1
          fi
          echo "PASS: no tracked .db / state.json / tokens.json / ssh_key / *.ndjson"

      - name: No tracked machine-readable IP / target lists
        shell: bash
        run: |
          set -uo pipefail
          hits="$(git ls-files \
            | grep -E '(^|/)(ips[^/]*\.txt|targets[^/]*\.txt|confirmed-ips[^/]*|[^/]*-dossiers\.json)$' \
            || true)"
          if [ -n "$hits" ]; then
            echo "FAIL: tracked machine-readable target lists / dossiers:"
            echo "$hits"
            exit 1
          fi
          echo "PASS: no tracked ips*.txt / targets*.txt / confirmed-ips* / *-dossiers.json"

      - name: No em dashes in tracked files
        shell: bash
        run: |
          set -uo pipefail
          # Build the em-dash (U+2014) at runtime so this workflow file stays clean.
          EMDASH="$(printf '\xe2\x80\x94')"
          hits="$(git ls-files | xargs -d '\n' grep -rIlF "$EMDASH" 2>/dev/null || true)"
          if [ -n "$hits" ]; then
            echo "FAIL: em dash (U+2014) found in:"
            echo "$hits"
            echo "Replace with a comma, a period, or a spaced hyphen."
            exit 1
          fi
          echo "PASS: no em dashes in tracked files"

      - name: Only RFC5737 doc IPs in prose
        shell: bash
        run: |
          set -uo pipefail
          # Scan tracked markdown and shell for IPv4 literals. Every match must be
          # an allowed doc/loopback/null address. Any other public IPv4 fails.
          fail=0
          files="$(git ls-files '*.md' '*.sh' || true)"
          for f in $files; do
            [ -f "$f" ] || continue
            while IFS= read -r ip; do
              [ -n "$ip" ] || continue
              case "$ip" in
                192.0.2.*|198.51.100.*|203.0.113.*) ;;   # RFC5737 documentation
                0.0.0.0|127.0.0.1|127.*) ;;              # null / loopback
                10.*|192.168.*) ;;                       # RFC1918 private (illustrative)
                172.1[6-9].*|172.2[0-9].*|172.3[0-1].*) ;;
                255.255.*) ;;                            # broadcast/mask literals
                *)
                  echo "FAIL: non-RFC5737 IPv4 in $f -> $ip"
                  fail=1
                  ;;
              esac
            done < <(grep -hoIE '([0-9]{1,3}\.){3}[0-9]{1,3}' "$f" 2>/dev/null || true)
          done
          if [ "$fail" -ne 0 ]; then
            echo "Use 192.0.2.x / 198.51.100.x / 203.0.113.x for illustrative IPs."
            exit 1
          fi
          echo "PASS: prose IPv4 literals are RFC5737 / loopback / private only"

      - name: No researcher PII
        shell: bash
        env:
          # Generic PII signal. We match an @gmail address and a rank/service
          # keyword rather than hardcoding any real name into a public file.
          # Kept identical to scripts/boundary-audit.sh so local and CI agree.
          # If a personal name pattern is ever needed, set PII_PATTERN as a
          # repo secret and extend the alternation below; do not commit it here.
          PII_PATTERN: '@gmail|staff sergeant|enlisted'
        run: |
          set -uo pipefail
          # Scan every tracked file except the two boundary-audit sources, which
          # by design hold the detector pattern itself and would self-flag. The
          # CI workflow and its local mirror script both carry the alternation.
          files="$(git ls-files | grep -vE '^(\.github/workflows/boundary-audit\.yml|scripts/boundary-audit\.sh)$' || true)"
          hits=""
          if [ -n "$files" ]; then
            hits="$(printf '%s\n' "$files" | xargs -d '\n' grep -rIlE "$PII_PATTERN" 2>/dev/null || true)"
          fi
          if [ -n "$hits" ]; then
            echo "FAIL: possible researcher PII in:"
            echo "$hits"
            echo "Contact is the string nuclide-research.com only. No personal name, email, or service history."
            exit 1
          fi
          echo "PASS: no @gmail / military / personal-identity markers in tracked files"

      - name: No disclosure-routing files
        shell: bash
        run: |
          set -uo pipefail
          hits="$(git ls-files \
            | grep -E '(_gmail_drafts|ready-to-send)' \
            || true)"
          if [ -n "$hits" ]; then
            echo "FAIL: disclosure-routing artifacts tracked:"
            echo "$hits"
            exit 1
          fi
          echo "PASS: no _gmail_drafts* / *ready-to-send* files tracked"

      - name: Boundary audit summary
        if: success()
        run: |
          echo "boundary-audit PASS: no live-target data, no PII, no em dashes, RFC5737 only"
